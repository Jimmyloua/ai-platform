apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-server
  namespace: aiplatform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skill-server
  template:
    metadata:
      labels:
        app: skill-server
    spec:
      containers:
        - name: skill-server
          image: aiplatform/skill-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: aiplatform-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/aiplatform
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: aiplatform-config
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: mysql-password
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skill-server
  namespace: aiplatform
spec:
  selector:
    app: skill-server
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP