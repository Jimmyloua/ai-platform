apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-gateway
  namespace: aiplatform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skill-gateway
  template:
    metadata:
      labels:
        app: skill-gateway
    spec:
      containers:
        - name: skill-gateway
          image: aiplatform/skill-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: aiplatform-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SKILL_SERVER_URL
              value: http://skill-server:8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: skill-gateway
  namespace: aiplatform
spec:
  selector:
    app: skill-gateway
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP