apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiplatform-ingress
  namespace: aiplatform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: skill-gateway
spec:
  ingressClassName: nginx
  rules:
    - host: aiplatform.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: skill-gateway
                port:
                  number: 8081
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: skill-gateway
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80