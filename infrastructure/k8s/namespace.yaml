apiVersion: v1
kind: Namespace
metadata:
  name: aiplatform
---
apiVersion: v1
kind: Secret
metadata:
  name: aiplatform-secrets
  namespace: aiplatform
type: Opaque
stringData:
  mysql-root-password: rootpassword
  mysql-password: aiplatform123
  redis-password: ""
